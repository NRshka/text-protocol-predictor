defaults:
  - _self_

dataset:
  root_dir: ???
  manifests:
    train: train.jsonl
    validation: validation.jsonl
    test: test.jsonl
  font_registry: null
  verify_image_dimensions: true
  num_workers: 8
  preflight_validation: true

augmentation:
  structural_noise:
    enabled: false
    probability: 1.0
    seed: 0
    group_translation_std_x: 0.015
    group_translation_std_y: 0.015
    group_scale_min: 0.95
    group_scale_max: 1.05
    group_rotation_probability: 0.15
    group_rotation_min_degrees: 0.5
    group_rotation_max_degrees: 2.0
    local_position_min: 0.003
    local_position_max: 0.010
    local_size_min: 0.02
    local_size_max: 0.06
    local_rotation_probability: 0.15
    local_rotation_min_degrees: 0.5
    local_rotation_max_degrees: 2.0
    bend_probability: 0.05
    bend_min_fraction: 0.03
    bend_max_fraction: 0.12

protocol:
  version: "1.0"
  canonicalizer_version: "1.0.0"
  decimal_places: 3
  unicode_normalization: NFC
  max_objects: 64

model:
  name_or_path: Qwen/Qwen3-VL-8B-Instruct
  weights_path: null
  precision: bf16
  max_output_tokens: 4096
  max_sequence_tokens: 16384
  image_min_pixels: 200704
  image_max_pixels: 1003520
  gradient_checkpointing: true
  attn_implementation: sdpa
  freeze_vision_tower: true
  freeze_multimodal_projector: true

lora:
  enabled: true
  rank: 128
  alpha: 256
  dropout: 0.05
  target_scope: language_decoder

training:
  seed: 2026
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  scheduler: cosine
  gradient_clip_norm: 1.0
  max_steps: 10000
  eval_steps: 250
  save_steps: 250
  progress_bar: true
  output_dir: outputs/sft
  resume_from: null

evaluation:
  per_device_batch_size: 1
  generation:
    enabled: true
    num_samples: 32
    per_device_batch_size: 1
    max_new_tokens: 4096

tracking:
  # One of: wandb, clearml, none.
  provider: wandb
  project: text-render-protocol-predictor
  run_name: null
  wandb:
    entity: null
    mode: online
  clearml:
    task_type: training
    reuse_last_task_id: false
