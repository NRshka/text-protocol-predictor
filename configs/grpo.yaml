defaults:
  - _self_

dataset:
  root_dir: ???
  manifests:
    train: train_grpo.jsonl
    validation: validation_grpo.jsonl
  require_webp: true
  minimum_mask_coverage: 1.0e-5
  maximum_mask_coverage: 0.75
  num_workers: 4
  preflight_validation: true

protocol:
  # Milestone one is text-only: decorations already remain in erased backgrounds.
  version: "1.0"
  max_objects: 64

renderer:
  # Files or directories scanned by synthetic-text-protocol's FontRegistry.
  font_paths: ???
  max_text_characters: 4096
  max_font_size: 2048
  # Reject pathological sampled boxes before they can allocate huge rasters.
  max_geometry_scale: 2.0

reward:
  mask_threshold: 0.5
  mask_dilation_radius: 4
  mask_blur_radius: 2.0
  outside_weight: 0.1
  cache_size: 8
  invalid_json_reward: -1.0
  invalid_schema_reward: -0.9
  invalid_semantics_reward: -0.85
  unknown_font_reward: -0.8
  renderer_failure_reward: -0.8

model:
  # Required: final_model (or equivalent) produced by train_sft.py.
  name_or_path: Qwen/Qwen3-VL-8B-Instruct
  weights_path: ???
  precision: bf16
  max_output_tokens: 4096
  max_sequence_tokens: 16384
  image_min_pixels: 200704
  image_max_pixels: 1003520
  gradient_checkpointing: true
  attn_implementation: sdpa
  freeze_vision_tower: true
  freeze_multimodal_projector: true

lora:
  enabled: true
  # These fields are ignored when loading an existing adapter but retained for
  # compatibility with the shared model loader.
  rank: 128
  alpha: 256
  dropout: 0.05
  target_scope: language_decoder

grpo:
  seed: 2026
  per_device_batch_size: 1
  gradient_accumulation_steps: 1
  num_generations: 4
  temperature: 0.8
  top_p: 0.95
  top_k: 0
  repetition_penalty: 1.0
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  scheduler: cosine
  gradient_clip_norm: 1.0
  beta: 0.01
  epsilon: 0.2
  num_iterations: 1
  scale_rewards: group
  max_steps: 20
  logging_steps: 1
  save_steps: 10
  save_total_limit: 2
  log_completions: true
  use_vllm: false
  output_dir: outputs/grpo-mae
  resume_from: null

evaluation:
  enabled: true
  per_device_batch_size: 1
  num_generations: 4
  eval_steps: 10

tracking:
  # One of: wandb, clearml, none.
  provider: wandb
  project: text-render-protocol-predictor
  run_name: grpo-mae-milestone-1
